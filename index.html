<!DOCTYPE html>
<html>
<head>
    <title>Valentine's Page</title>
    <style>
        .yes-button {
            transition: transform 0.3s;
        }
        .no-button:hover + .yes-button {
            transform: scale(1.2);
        }
        .emoji {
            transition: transform 0.3s;
        }
        .emoji:hover {
            transform: scale(1.3);
        }
        .emoji:active {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>Happy Valentine's Day!</h1>
    <button class="no-button">No ❤️</button>
    <button class="yes-button emoji">Yes 🎉</button>
</body>
</html>
