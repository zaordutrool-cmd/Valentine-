<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Will you be my valentine?) </title>

<style>

body{
font-family: Arial, sans-serif;
background: #111;
color: white;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
margin: 0;
}

h1{
font-size: 40px;
margin-bottom: 20px;
}

.emoji-display{
font-size: 60px;
margin-bottom: 40px;
min-height: 70px;
}

.buttons{
position: relative;
display: flex;
gap: 20px;
}

button{
font-size: 20px;
padding: 12px 25px;
margin: 10px;
border: none;
border-radius: 8px;
cursor: pointer;
transition: all 0.2s;
}

#yes{
background: #4CAF50;
color: white;
font-size: 24px;
padding: 15px 40px;
}

#yes:hover{
background: #45a049;
transform: scale(1.1);
}

#no{
background: #ff4444;
color: white;
position: absolute;
font-size: 20px;
padding: 12px 25px;
}

.final-message{
text-align: center;
font-size: 48px;
}

</style>
</head>

<body>

<h1>Will you be my valentine? ❤️</h1>

<div class="emoji-display" id="emoji">😊</div>

<div class="buttons">
<button id="yes">YES 💚</button>
<button id="no">NO</button>
</div>

<script>

const noButton = document.getElementById("no");
const yesButton = document.getElementById("yes");
const emojiDisplay = document.getElementById("emoji");
let yesButtonSize = 1;

// Когда наводим на красную кнопку NO - смайлик злой
noButton.addEventListener("mouseover", () => {
emojiDisplay.textContent = "😡";

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 100);

noButton.style.left = x + "px";
noButton.style.top = y + "px";

// Кнопка YES увеличивается
yesButtonSize += 0.1;
yesButton.style.transform = `scale(${yesButtonSize})`;
});

// Когда кликаем YES - смайлик влюбленный
yesButton.addEventListener("click", () => {
document.body.innerHTML = `
<div class="final-message">
<div style="font-size: 100px; margin-bottom: 30px;">😍</div>
<h1 style="font-size: 50px;">Ты нажал YES! 💕</h1>
<p style="font-size: 30px;">Ты лучшая! 💋</p>
</div>
`;
});

// Когда наводим обратно на кнопку YES - обычный смайлик
yesButton.addEventListener("mouseover", () => {
emojiDisplay.textContent = "😊";
});

</script>

</body>
</html>
